name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Pytest
    runs-on: [self-hosted, soliso, openvidia]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages --quiet pytest pytest-asyncio httpx fastapi psutil

      - name: Run tests
        run: PYTHONPATH=. python3 -m pytest tests/ -v --tb=short

  lint:
    name: Ruff
    runs-on: [self-hosted, soliso, openvidia]

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: python3 -m pip install --break-system-packages --quiet ruff

      - name: Lint
        run: python3 -m ruff check openvidia/ tests/

      - name: Format check
        run: python3 -m ruff format --check openvidia/ tests/
