name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Pytest
    runs-on: [self-hosted, soliso, openvidia]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install pytest pytest-asyncio httpx fastapi psutil --quiet

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  lint:
    name: Ruff
    runs-on: [self-hosted, soliso, openvidia]

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff --quiet

      - name: Lint
        run: ruff check openvidia/ tests/

      - name: Format check
        run: ruff format --check openvidia/ tests/
