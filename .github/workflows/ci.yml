name: CI

on:
  push:            # every branch, so a fix is verified before it reaches a PR
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    # Deliberately NOT `pip install .`: the desktop extras (PyQt6, PyGObject)
    # need system libraries that add nothing to a headless test run.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio httpx fastapi psutil
    
    - name: Run tests
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short
    
    - name: Check build
      run: |
        pip install build twine
        python -m build
        twine check dist/*

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install ruff
      run: pip install ruff
    
    - name: Run ruff
      run: ruff check openvidia/ tests/
