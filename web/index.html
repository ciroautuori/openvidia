<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="OpenVidia — local multi-key proxy control panel for NVIDIA-hosted models." />
    <title>OpenVidia</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="bg-canvas"></div>
    <div id="toast-container"></div>

    <div id="app">
      <header>
        <div class="logo">
          <img src="logo.png" alt="OpenVidia" class="logo-img">
          <span class="logo-text">OpenVidia</span>
        </div>
        <div class="header-right">
          <span class="header-stat" id="hKeyCount">0 keys</span>
          <span class="header-stat" id="hRpm">0 RPM</span>
          <button class="theme-btn" id="themeToggle" title="Toggle theme">🌙</button>
        </div>
      </header>

      <div class="bento">
        <!-- ── STATUS (cell-status) ── -->
        <div class="bento-cell cell-status">
          <span class="indicator-dot" id="statusDot"><span class="pulse-dot running"></span></span>
          <div class="status-info">
            <span class="status-label" id="statusText">Running</span>
            <span class="status-meta">Port <strong id="portDisplay">1919</strong> · <strong id="activeModelDisplay">none</strong></span>
          </div>
          <div class="status-acts">
            <button class="btn btn-sm" id="stopBtn" title="Stop">⏹</button>
            <button class="btn btn-sm" id="startBtn" title="Start" style="display:none">▶</button>
            <button class="btn btn-sm" id="restartBtn" title="Restart">⟳</button>
          </div>
        </div>

        <!-- ── STATS (cell-stats, col-span-3) ── -->
        <div class="bento-cell cell-stats col-span-3">
          <div class="stat-mini"><span class="stat-num" id="statReqs">0</span><span class="stat-label">req</span></div>
          <div class="stat-mini"><span class="stat-num" id="statOk">0</span><span class="stat-label">ok</span></div>
          <div class="stat-mini"><span class="stat-num" id="statRots">0</span><span class="stat-label">rot</span></div>
          <div class="stat-mini" id="cdMini"><span class="stat-num" id="statCooldowns">0</span><span class="stat-label">⏳</span></div>
        </div>

        <!-- ── MODELS (unica lista; ★ Starred = shortlist di scelta rapida) ── -->
        <div class="bento-cell cell-models col-span-2" data-dropdown>
          <div class="bento-hd" data-toggle data-idx="01">
            <span class="bento-ttl">Models</span>
            <span class="bento-badge" id="modelCount">0</span>
            <span class="chevron">▸</span>
          </div>
          <div class="bento-body" data-body>
            <div class="bento-body-inner">
              <div class="browser-filters" id="modelFilters"></div>
              <input type="text" class="browser-input" id="modelSearch" placeholder="Search models…" spellcheck="false" />
              <div class="browser-list" id="modelList"><div class="browser-empty">Loading…</div></div>
            </div>
          </div>
        </div>

        <!-- ── KEY MANAGEMENT (subito dopo status/stats, full width, default aperto) ── -->
        <div class="bento-cell cell-keys col-span-4 open" data-dropdown>
          <div class="bento-hd" data-toggle data-idx="02">
            <span class="bento-ttl">Keys</span>
            <span class="bento-badge" id="keyCount">0</span>
            <span class="chevron">▸</span>
          </div>
          <div class="bento-body" data-body>
            <div class="bento-body-inner">
              <div class="keys-toolbar">
                <div class="key-filters" id="keyFilters">
                  <button class="key-filter" data-filter="all">All <span class="filter-count" id="fAll">0</span></button>
                  <button class="key-filter active" data-filter="active">Active <span class="filter-count" id="fActive">0</span></button>
                  <button class="key-filter" data-filter="cooldown">⏳ <span class="filter-count" id="fCooldown">0</span></button>
                  <button class="key-filter" data-filter="fresh">● <span class="filter-count" id="fFresh">0</span></button>
                  <button class="key-filter" data-filter="idle">Idle <span class="filter-count" id="fIdle">0</span></button>
                </div>
                <button class="btn btn-sm btn-primary" id="addKeyBtn">+ Add Key</button>
              </div>
              <div class="slide-form hidden" id="keyAddForm">
                <input type="text" id="newKeyInput" spellcheck="false" placeholder="nvapi-…" autocomplete="off" />
                <div class="slide-form-actions">
                  <button class="btn btn-sm btn-primary" id="confirmAddKeyBtn">Add</button>
                  <button class="btn btn-sm" id="cancelAddKeyBtn">Cancel</button>
                </div>
              </div>
              <div class="empty-state hidden" id="keysEmpty">
                <div class="empty-ttl">No keys loaded</div>
                <div class="empty-desc">Add keys with the button above</div>
              </div>
              <div id="keysList" class="keys-list"></div>
            </div>
          </div>
        </div>

        <!-- ── ACTIVITY LOG (cell-log, col-span-2) ── -->
        <div class="bento-cell cell-log col-span-2" data-dropdown>
          <div class="bento-hd" data-toggle data-idx="04">
            <span class="bento-ttl"><span class="log-dot" id="logDot"></span>Activity</span>
            <span class="bento-badge" id="logCount">0</span>
            <span class="chevron">▸</span>
          </div>
          <div class="bento-body" data-body>
            <div class="bento-body-inner">
              <div class="log-toolbar">
                <button class="btn btn-sm" id="clearLogBtn">Clear</button>
              </div>
              <div class="log-box" id="logArea">
                <div class="log-empty">Waiting for events…</div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── CLI SETUP (cell-cli, full width) ── -->
        <div class="bento-cell cell-cli col-span-4" data-dropdown>
          <div class="bento-hd" data-toggle data-idx="05">
            <span class="bento-ttl">CLI Setup</span>
            <span class="chevron">▸</span>
          </div>
          <div class="bento-body" data-body>
            <div class="bento-body-inner">
              <div class="cli-tabs" id="cliTabs"></div>
              <div class="cli-setup" id="cliSetup"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
